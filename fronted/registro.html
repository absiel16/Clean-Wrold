<!DOCTYPE html>
<html>
<head>
    <title>Registro Clean World</title>
</head>
<body>

<h2>Registro </h2>

<form id="formRegistro">
    <input type="text" id="nombre" placeholder="Nombre" required><br><br>
    <input type="email" id="email" placeholder="Correo" required><br><br>
    <input type="password" id="password" placeholder="Contraseña" required><br><br>
    <button type="submit">Registrarse</button>
</form>

<p id="mensaje"></p>

<script>
document.getElementById("formRegistro").addEventListener("submit", async (e) => {
    e.preventDefault();

    const datos = {
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const respuesta = await fetch("http://localhost:3000/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(datos)
    });

    const data = await respuesta.json();
    document.getElementById("mensaje").innerText = data.mensaje || data.error;
});
</script>

</body>
</html>
